<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>API Monitoring</title>
    <link rel="stylesheet" href="/api/v1/monitoring-ui/API-List/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="title_box">
        <span class="title">API List</span>
        <div class="theme-switcher">
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="setTheme('light')">☀️ Light</button>
            <button type="button" class="btn btn-sm btn-outline-dark" onclick="setTheme('dark')">🌙 Dark</button>
        </div>
    </div>
    <div class="content_box">
        <div class="accordion" id="apiAccordion">
            <div class="d-flex flex-wrap gap-2 mb-3">
                <button class="btn btn-primary" onclick="downloadBrunoCollection()">📦 Bruno Collection</button>
                <button class="btn btn-warning" onclick="downloadInsomniaCollection()">🧩 Insomnia Collection</button>
                <button class="btn btn-info" onclick="downloadPostmanCollection()">📮 Postman Collection</button>
            </div>
            <div id="container"></div>
        </div>



    </div>

    <script src="/api/v1/monitoring-ui/API-List/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
