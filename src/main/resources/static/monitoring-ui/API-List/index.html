<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>API Monitoring</title>
    <link rel="stylesheet" href="/monitoring-ui/API-List/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="title_box">
        <span class="title">API List</span>
        <!--<div class="theme-switcher">
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="setTheme('light')">☀️ Light</button>
            <button type="button" class="btn btn-sm btn-outline-dark" onclick="setTheme('dark')">🌙 Dark</button>
        </div>-->
    </div>
    <div class="content_box">
        <h5>API Collections</h5>
        <p class="text-muted mb-3">
            Export your application's API endpoints in a format compatible with popular API testing tools.
        </p>
        <!--<div class="d-flex gap-3 w-100">
            <button class="btn btn-primary" onclick="downloadBrunoCollection()">
                <img src="/monitoring-ui/API-List/images/bruno.png" alt="Bruno" class="tool-icon">
                Bruno Collection
            </button>

            <button class="btn btn-warning" onclick="downloadInsomniaCollection()">
                <img src="/monitoring-ui/API-List/images/insomnia.png" alt="Insomnia" class="tool-icon">
                Insomnia Collection
            </button>

            <button class="btn btn-info" onclick="downloadPostmanCollection()">
                <img src="/monitoring-ui/API-List/images/postman.png" alt="Postman" class="tool-icon">
                Postman Collection
            </button>
        </div>-->
        <button class="btn btn-primary" onclick="openCollectionModal('bruno')">
            <img src="/monitoring-ui/API-List/images/bruno.png" class="tool-icon">
            Bruno Collection
        </button>

        <button class="btn btn-warning" onclick="openCollectionModal('insomnia')">
            <img src="/monitoring-ui/API-List/images/insomnia.png" class="tool-icon">
            Insomnia Collection
        </button>

        <button class="btn btn-info" onclick="openCollectionModal('postman')">
            <img src="/monitoring-ui/API-List/images/postman.png" class="tool-icon">
            Postman Collection
        </button>
    </div>

    <div id="applicationBox" class="content_box">

        <h4>Application APIs</h4>

        <div class="accordion" id="applicationAccordion">
            <div id="applicationContainer"></div>
        </div>

    </div>



    <div id="systemBox" class="content_box">

        <h4>System APIs</h4>

        <div class="accordion" id="systemAccordion">
            <div id="systemContainer"></div>
        </div>

    </div>
    <div class="modal fade" id="collectionModal" tabindex="-1">

        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content collection-modal">
                <div class="modal-header">
                    <div>
                        <h4 class="modal-title fw-bold">Export API Collection</h4>
                        <small class="text-muted">Select the APIs you want to export</small>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="selectedCollectionType">
                    <div class="collection-options">
                        <!-- ALL -->
                        <label class="collection-card">
                            <input  type="radio" name="collectionOption" value="all" checked>
                            <div class="collection-content">

                                <div>
                                    <h6>Whole Collection</h6>
                                    <p>Export all application and system APIs</p>
                                </div>
                            </div>
                        </label>
                        <!-- APPLICATION -->
                        <label class="collection-card">
                            <input class="form-check-input" type="radio" name="collectionOption" value="application">
                            <div class="collection-content">

                                <div>
                                    <h6>Application APIs</h6>
                                    <p>Export user-developed APIs only</p>
                                </div>
                            </div>
                        </label>
                        <!-- SYSTEM -->
                        <label class="collection-card">
                            <input class="form-check-input" type="radio" name="collectionOption" value="system">
                            <div class="collection-content">

                                <div>
                                    <h6>System APIs</h6>
                                    <p>Export framework and system APIs</p>
                                </div>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary px-4" onclick="downloadSelectedCollection()"> ⬇ Download</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/monitoring-ui/API-List/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
